version: "3.8"

services:
  frontend:
    container_name: mern-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

  backend:
    container_name: mern-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5003:5000"
    depends_on:
      - mongo
    restart: always

  mongo:
    container_name: mern-mongo
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data:
